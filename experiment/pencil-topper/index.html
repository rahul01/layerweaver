<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Personalized Pencil Topper - Live Preview Prototype</title>
<link rel="stylesheet" href="../shared/customizer.css">
</head>
<body>
<div id="controls">
  <h2>Pencil Topper Customizer</h2>

  <label for="line1">Name (max 15 characters)</label>
  <input type="text" id="line1" maxlength="15" value="Surbhi">

  <label for="font">Font</label>
  <select id="font">
    <option value="Comic Neue:style=Bold" selected>Comic Neue (Bold)</option>
    <option value="Pacifico">Pacifico</option>
    <option value="Kalam">Kalam (Devanagari)</option>
    <option value="Anek Bangla:style=Regular">Anek Bangla</option>
    <option value="Anek Gujarati:style=Regular">Anek Gujarati</option>
    <option value="Anek Gurmukhi:style=Regular">Anek Gurmukhi</option>
    <option value="Anek Kannada:style=Regular">Anek Kannada</option>
    <option value="Anek Malayalam:style=Regular">Anek Malayalam</option>
    <option value="Anek Odia:style=Regular">Anek Odia</option>
    <option value="Anek Tamil:style=Regular">Anek Tamil</option>
    <option value="Anek Telugu:style=Regular">Anek Telugu</option>
  </select>

  <label for="textsize">Text size (mm)</label>
  <input type="number" id="textsize" min="5" max="16" step="0.5" value="12">

  <label for="extension">Plate margin around text (mm)</label>
  <input type="number" id="extension" min="0.6" max="3" step="0.2" value="2.3">

  <h3>Pencil hole</h3>
  <div class="range-row">
    <div>
      <label for="offsetx">Hole position within letters (mm)</label>
      <input type="number" id="offsetx" min="-3" max="3" step="0.5" value="0">
    </div>
    <div>
      <label for="offsety">Hole depth offset (mm)</label>
      <input type="number" id="offsety" min="-2" max="2" step="0.5" value="0">
    </div>
  </div>

  <h3>Colors</h3>
  <div class="color-block">
    <div class="color-block-label">Base plate</div>
    <div class="color-row" id="baseColors">
      <div class="color-swatch" data-color="#A083D5" style="background:#A083D5"></div>
      <div class="color-swatch" data-color="#F5F1FA" style="background:#F5F1FA"></div>
      <div class="color-swatch" data-color="#222222" style="background:#222222"></div>
      <div class="color-swatch active" data-color="#E0555A" style="background:#E0555A"></div>
      <div class="color-swatch" data-color="#4C8BF5" style="background:#4C8BF5"></div>
      <div class="color-swatch" data-color="#F2C94C" style="background:#F2C94C"></div>
    </div>
  </div>
  <div class="color-block">
    <div class="color-block-label">Text</div>
    <div class="color-row" id="textColors">
      <div class="color-swatch" data-color="#A083D5" style="background:#A083D5"></div>
      <div class="color-swatch active" data-color="#F5F1FA" style="background:#F5F1FA"></div>
      <div class="color-swatch" data-color="#222222" style="background:#222222"></div>
      <div class="color-swatch" data-color="#E0555A" style="background:#E0555A"></div>
      <div class="color-swatch" data-color="#4C8BF5" style="background:#4C8BF5"></div>
      <div class="color-swatch" data-color="#F2C94C" style="background:#F2C94C"></div>
    </div>
  </div>

  <button id="generateBtn" class="generate-btn">Generate Model</button>
  <div id="status">Loading OpenSCAD engine…</div>
</div>
<div id="viewer">
  <div class="spinner" id="spinner"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="../shared/vendor/sanscript.js"></script>
<script type="module">
import { initCustomizer, SHARED_FONTS, wireTransliteratingNameInput } from '../shared/customizer-engine.js';
import { textOutlineHeader } from '../shared/scad-text-outline.js';

// Fixed dimensions (not user-adjustable): base block thickness 12mm (thick
// enough to grip a pencil by friction), raised text height 1.4mm, pencil hole
// diameter, no fillet (crisp corners, consistent with the keychain product).
// Matches the proportions of the reference MakerWorld pencil topper design.
const BASE_THICKNESS = 12;
const TEXT_HEIGHT = 1.4;
const HOLE_DIAMETER = 7.8;   // fits standard hex/round pencils via friction fit
const FILLET_RADIUS = 0;

// Pencil-topper-specific attachment feature: a straight cylindrical hole
// drilled along the X axis - the same direction the name reads - so the
// pencil threads all the way through every letter, and the whole name stays
// supported along the pencil's length instead of overhanging past it (which
// is what happened when the hole ran only through one narrow slice of the
// name). This needs a real 3D cylinder rotated onto the X axis and subtracted
// from the already-extruded block, since a 2D-circle-then-extrude trick (like
// the keyring hole) only works when the hole runs the same direction as the
// extrusion. This is the only part of the geometry unique to this product -
// the text-outline base and raised text are shared with every product here.
function pencilHoleScad(params) {
  const holeR = HOLE_DIAMETER / 2;
  return `
hole_r = ${holeR};
hole_len = 400;
offset_x = ${params.offsetX};
offset_y = ${params.offsetY};
hole_pos = [0, content_h * 0.35 + offset_x, ${params.thickness / 2} + offset_y];

module pencil_hole() {
  translate(hole_pos)
    rotate([0, 90, 0])
      cylinder(r = hole_r, h = hole_len, center = true, $fn = 64);
}
`;
}

function buildBaseScad(params) {
  return textOutlineHeader(params) + pencilHoleScad(params) + `
thickness = ${params.thickness};
difference() {
  linear_extrude(height = thickness)
    fillet_concave(${FILLET_RADIUS})
      base_outline();
  pencil_hole();
}
`;
}

function buildTextScad(params) {
  // Text sits flush on top of the base plate, embedded slightly for adhesion.
  return textOutlineHeader(params) + `
thickness = ${params.thickness};
text_height = ${params.textHeight};
embed = min(0.4, thickness * 0.2);
translate([0, 0, thickness - embed])
  linear_extrude(height = text_height + embed)
    engraving();
`;
}

const line1Input = document.getElementById('line1');
const fontSelect = document.getElementById('font');
const textsizeInput = document.getElementById('textsize');
const extensionInput = document.getElementById('extension');
const offsetxInput = document.getElementById('offsetx');
const offsetyInput = document.getElementById('offsety');

const baseColorsEl = document.getElementById('baseColors');
const textColorsEl = document.getElementById('textColors');

// Type phonetically in Latin (e.g. "surbhi") and it's transliterated live
// into whichever script the selected font uses (Kalam -> Devanagari, the
// Anek fonts -> their matching Indian script).
const nameTransliterator = wireTransliteratingNameInput({
  inputEl: line1Input,
  fontSelectEl: fontSelect,
  maxLength: 15,
});

// Generation is fully deterministic - the same parameters always produce the
// same STL - so an order never needs to store the file itself. Instead, the
// finalized parameters get encoded into this page's own URL after every
// render; that URL is the "recipe" you'd save as a single line-item property
// and reopen later (e.g. at fulfillment time) to regenerate the exact model.
function activeColorHex(rowEl) {
  return rowEl.querySelector('.color-swatch.active')?.dataset.color.replace('#', '') || '';
}
function setActiveColor(rowEl, hex) {
  if (!hex) return;
  const swatch = rowEl.querySelector(`.color-swatch[data-color="#${hex.toUpperCase()}"]`);
  if (!swatch) return;
  rowEl.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');
}

const qp = new URLSearchParams(location.search);
if (qp.has('font')) fontSelect.value = qp.get('font');
if (qp.has('name')) nameTransliterator.setValue(qp.get('name'));
if (qp.has('textSize')) textsizeInput.value = qp.get('textSize');
if (qp.has('extension')) extensionInput.value = qp.get('extension');
if (qp.has('offsetX')) offsetxInput.value = qp.get('offsetX');
if (qp.has('offsetY')) offsetyInput.value = qp.get('offsetY');
setActiveColor(baseColorsEl, qp.get('baseColor'));
setActiveColor(textColorsEl, qp.get('textColor'));

initCustomizer({
  viewer: document.getElementById('viewer'),
  statusEl: document.getElementById('status'),
  spinnerEl: document.getElementById('spinner'),
  generateBtn: document.getElementById('generateBtn'),
  fonts: SHARED_FONTS,
  solids: [
    { id: 'base', defaultColor: qp.has('baseColor') ? parseInt(qp.get('baseColor'), 16) : 0xE0555A, buildScad: buildBaseScad },
    { id: 'text', defaultColor: qp.has('textColor') ? parseInt(qp.get('textColor'), 16) : 0xF5F1FA, buildScad: buildTextScad },
  ],
  colorPickers: {
    base: baseColorsEl,
    text: textColorsEl,
  },
  getParams() {
    const lines = [line1Input.value.trim() || 'Name'];
    return {
      lines,
      font: fontSelect.value,
      textSize: parseFloat(textsizeInput.value),
      extension: parseFloat(extensionInput.value),
      thickness: BASE_THICKNESS,
      textHeight: TEXT_HEIGHT,
      offsetX: parseFloat(offsetxInput.value),
      offsetY: parseFloat(offsetyInput.value),
    };
  },
  namePrefix(params) {
    return 'pencil-topper-' + (params.lines[0] || 'name').replace(/[^a-z0-9]/gi, '_');
  },
  describe(params) {
    return `"${params.lines.join(' / ')}"`;
  },
  onRendered(params) {
    const search = new URLSearchParams({
      name: params.lines[0],
      font: params.font,
      textSize: params.textSize,
      extension: params.extension,
      offsetX: params.offsetX,
      offsetY: params.offsetY,
      baseColor: activeColorHex(baseColorsEl),
      textColor: activeColorHex(textColorsEl),
    });
    history.replaceState(null, '', '?' + search.toString());
  },
});
</script>
</body>
</html>
