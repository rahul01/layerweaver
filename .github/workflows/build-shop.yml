name: Build Shop Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'shop/index.html'
      - 'shop/products/**'
  schedule:
    # Rebuild daily at midnight UTC to pick up new/updated products
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build shop pages
        env:
          SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}
        run: node scripts/build-shop.js

      - name: Commit generated shop pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shop/index.html shop/products/
          git diff --cached --quiet || git commit -m "chore: rebuild shop pages [skip ci]"
          git push
