<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Ad 2 - Number Plate Keychain</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Science+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A083D5;
            --secondary: #EFCF20;
            --dark: #000000;
            --light: #FFFFFF;
            --font-primary: 'Montserrat', sans-serif;
            --font-brand: 'Science Gothic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-primary);
            gap: 16px;
            padding: 40px;
        }

        .ad-label {
            color: #666;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: var(--font-primary);
        }

        /* 1080×1080 canvas */
        .ad {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #ffffff;
            flex-shrink: 0;
        }

        /* ── BACKMOST LAYER: product image ── */
        .bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center 38%;
            transform: none;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* ── TOP BAR (dark text - white background) ── */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 48px 64px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .brand-logo {
            height: 48px;
            width: auto;
            flex-shrink: 0;
        }

        .brand-name {
            font-family: var(--font-brand);
            font-size: 34px;
            font-weight: 700;
            color: var(--dark);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .tag {
            background: var(--dark);
            color: var(--light);
            font-family: var(--font-primary);
            font-size: 20px;
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── COPY BAND: floats over image at the bottom ── */
        .copy-band {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            background: var(--secondary);
            padding: 44px 64px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
        }

        .copy-left { flex: 1; }

        .eyebrow {
            font-family: var(--font-primary);
            font-size: 20px;
            font-weight: 700;
            color: rgba(0,0,0,0.45);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .headline {
            font-family: var(--font-primary);
            font-size: 82px;
            font-weight: 900;
            color: var(--dark);
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .sub {
            font-family: var(--font-primary);
            font-size: 24px;
            color: rgba(0,0,0,0.58);
            font-weight: 500;
            line-height: 1.5;
        }

        .copy-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 16px;
            flex-shrink: 0;
        }

        .price-block { text-align: right; }

        .price-label {
            font-family: var(--font-primary);
            font-size: 16px;
            font-weight: 600;
            color: rgba(0,0,0,0.42);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .price {
            font-family: var(--font-primary);
            font-size: 64px;
            font-weight: 900;
            color: var(--dark);
            line-height: 1;
        }

        .cta-btn {
            background: var(--dark);
            color: var(--light);
            font-family: var(--font-primary);
            font-size: 22px;
            font-weight: 700;
            padding: 22px 46px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        /* Science Gothic for URL only */
        .url {
            font-family: var(--font-brand);
            font-size: 16px;
            color: rgba(0,0,0,0.28);
            letter-spacing: 0.06em;
            align-self: flex-end;
        }

        /* ── Responsive scale-down ── */
        @media (max-width: 1180px) {
            .ad { width: min(1080px, 90vw); height: min(1080px, 90vw); }
            .top-bar { padding: min(48px, 4.4%) min(64px, 5.9%) 0; }
            .brand-logo { height: min(48px, 4.4vw); }
            .brand-name { font-size: min(34px, 3.1vw); }
            .tag { font-size: min(20px, 1.85vw); padding: min(10px, 0.9vw) min(26px, 2.4vw); }
            .copy-band { padding: min(44px, 4.1%) min(64px, 5.9%) min(48px, 4.4%); gap: min(32px, 3vw); }
            .eyebrow { font-size: min(20px, 1.85vw); }
            .headline { font-size: min(82px, 7.6vw); }
            .sub { font-size: min(24px, 2.2vw); }
            .price { font-size: min(64px, 5.9vw); }
            .price-label { font-size: min(16px, 1.5vw); }
            .cta-btn { font-size: min(22px, 2vw); padding: min(22px, 2vw) min(46px, 4.3vw); }
            .url { font-size: min(16px, 1.5vw); }
        }
    </style>
</head>
<body>
    <p class="ad-label">Instagram Ad 2 - 1080 × 1080 px</p>

    <div class="ad">
        <!-- Backmost layer -->
        <img class="bg-img"
             src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/ChatGPT_Image_Jun_5_2026_04_34_44_PM.png?v=1780657554"
             alt="Personalized Number Plate Keychain">

        <div class="top-bar">
            <div class="brand">
                <img class="brand-logo"
                     src="../../images/layerweaver-logo.svg"
                     alt="LayerWeaver">
                <span class="brand-name">LayerWeaver</span>
            </div>
            <span class="tag">3D Printed</span>
        </div>

        <div class="copy-band">
            <div class="copy-left">
                <p class="eyebrow">Personalized Keychain</p>
                <h2 class="headline">Carry Your<br>Ride. Always.</h2>
                <p class="sub">Your number plate. 3D printed.<br>Custom made just for you.</p>
            </div>
            <div class="copy-right">
                <div class="price-block">
                    <span class="price-label">Starting at</span>
                    <span class="price">₹149</span>
                </div>
                <button class="cta-btn">Shop Now →</button>
                <span class="url">layerweaver.com/shop</span>
            </div>
        </div>
    </div>
</body>
</html>
