<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Cat Cable Clip - Reel Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Science+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A083D5;
            --secondary: #EFCF20;
            --dark: #000000;
            --light: #FFFFFF;
            --font-primary: 'Montserrat', sans-serif;
            --font-brand: 'Science Gothic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-primary);
            overflow: hidden;
        }

        .reel {
            width: 1080px;
            height: 1920px;
            position: relative;
            overflow: hidden;
            background: var(--primary);
        }

        .reel-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(239,207,32,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(239,207,32,0.08) 0%, transparent 40%);
        }

        .reel-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 56px 48px 52px;
        }

        /* ── Top bar ── */
        .reel-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            opacity: 0;
            transform: translateY(-30px);
            animation: slideDown 0.6s ease-out 0.3s forwards;
        }
        .brand-logo { height: 72px; width: auto; }
        .brand-name {
            font-family: var(--font-brand);
            font-size: 48px;
            font-weight: 700;
            color: var(--light);
            letter-spacing: 0.04em;
        }

        .milestone-badge {
            background: var(--secondary);
            color: var(--dark);
            font-size: 28px;
            font-weight: 800;
            padding: 12px 32px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            opacity: 0;
            transform: scale(0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s forwards;
        }

        /* ── Hero ── */
        .reel-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 40px;
        }

        /* Images */
        .reel-images {
            position: relative;
            width: 640px;
            height: 600px;
        }

        .reel-img-back {
            position: absolute;
            top: 0;
            right: 10px;
            width: 420px;
            height: 420px;
            border-radius: 28px;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.15);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform: rotate(5deg) scale(0.3);
            opacity: 0;
            animation: imgRevealBack 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1) 1.0s forwards;
        }

        .reel-img-front {
            position: absolute;
            bottom: 0;
            left: 10px;
            width: 400px;
            height: 400px;
            border-radius: 28px;
            overflow: hidden;
            border: 4px solid var(--secondary);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2;
            transform: rotate(-4deg) scale(0.3);
            opacity: 0;
            animation: imgRevealFront 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1) 1.4s forwards;
        }

        .reel-img-back img,
        .reel-img-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-free-badge {
            position: absolute;
            bottom: 40px;
            left: -2px;
            z-index: 5;
            background: var(--secondary);
            color: var(--dark);
            font-size: 42px;
            font-weight: 900;
            padding: 14px 44px 14px 28px;
            border-radius: 0 4px 4px 0;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transform: translateX(-120%);
            opacity: 0;
            animation: slideInLeft 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 2.0s forwards;
        }
        .reel-free-badge::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 0;
            border-style: solid;
            border-width: 0 0 6px 12px;
            border-color: transparent transparent #b8a010 transparent;
        }

        /* Text */
        .reel-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .reel-pre {
            font-size: 44px;
            font-weight: 800;
            color: var(--light);
            letter-spacing: 0.08em;
            opacity: 0;
            transform: translateY(40px);
            animation: slideUp 0.6s ease-out 2.4s forwards;
        }

        .reel-headline {
            font-size: 100px;
            font-weight: 900;
            color: var(--secondary);
            line-height: 0.95;
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            animation: headlineIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.1) 2.7s forwards;
        }

        .reel-sub {
            font-size: 38px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.5s ease-out 3.2s forwards;
        }

        /* ── Bottom ── */
        .reel-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding-top: 24px;
            border-top: 3px solid rgba(255,255,255,0.15);
            opacity: 0;
            transform: translateY(60px);
            animation: slideUp 0.7s ease-out 3.6s forwards;
        }

        .reel-condition {
            font-size: 40px;
            font-weight: 700;
            color: var(--light);
        }
        .reel-condition .amt { color: var(--secondary); font-weight: 900; }

        .reel-offer-extra {
            font-size: 34px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
        }
        .reel-offer-extra strong { color: var(--secondary); }

        .cta-btn {
            display: inline-block;
            background: var(--light);
            color: var(--dark);
            font-family: var(--font-primary);
            font-size: 38px;
            font-weight: 700;
            padding: 28px 64px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            margin-top: 8px;
            opacity: 0;
            transform: scale(0.8);
            animation: ctaPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 4.1s forwards;
        }

        .url-tag {
            font-family: var(--font-brand);
            font-size: 32px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.04em;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 4.4s forwards;
        }

        .reel-date {
            font-size: 32px;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
        }

        /* ── Animations ── */
        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes imgRevealBack {
            to { opacity: 1; transform: rotate(5deg) scale(1); }
        }

        @keyframes imgRevealFront {
            to { opacity: 1; transform: rotate(-4deg) scale(1); }
        }

        @keyframes slideInLeft {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes headlineIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes ctaPop {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Pulse on CTA after it appears */
        .cta-btn {
            animation: ctaPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 4.1s forwards,
                       ctaPulse 1.5s ease-in-out 4.8s infinite;
        }

        @keyframes ctaPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            50% { box-shadow: 0 0 0 16px rgba(255,255,255,0); }
        }
    </style>
</head>
<body>
    <div class="reel">
        <div class="reel-bg"></div>
        <div class="reel-content">
            <div class="reel-top">
                <div class="brand">
                    <img class="brand-logo" src="../../images/layerweaver-logo-white.svg" alt="LayerWeaver">
                    <span class="brand-name">LayerWeaver</span>
                </div>
                <span class="milestone-badge">Celebrating</span>
            </div>

            <div class="reel-hero">
                <div class="reel-images">
                    <div class="reel-img-back">
                        <img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/white-cat-figurine-cleaned-up.png?v=1777898401" alt="Cat Cable Clip">
                    </div>
                    <div class="reel-img-front">
                        <img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/product_May_4_2026_06_23_37_PM.png?v=1777899281" alt="Cat Cable Clip on cable">
                    </div>
                    <span class="reel-free-badge">Free!</span>
                </div>

                <div class="reel-text">
                    <div class="reel-pre">LayerWeaver Turns 6 Months</div>
                    <div class="reel-headline">Free<br>Cat Cable Clip</div>
                    <p class="reel-sub">Mark your cable in style</p>
                </div>
            </div>

            <div class="reel-bottom">
                <p class="reel-condition">On orders above <span class="amt">&#8377;299</span></p>
                <p class="reel-offer-extra">+ <strong>Free Shipping</strong> on every order</p>
                <span class="reel-date">Offer lasts till 1st July</span>
                <span class="cta-btn">Shop Now</span>
                <span class="url-tag">layerweaver.com/shop</span>
            </div>
        </div>
    </div>
</body>
</html>
