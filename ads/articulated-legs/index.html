<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC682MJG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'GT-NC682MJG');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Ad - Articulated Legs Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Science+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A083D5;
            --secondary: #EFCF20;
            --dark: #000000;
            --light: #FFFFFF;
            --font-primary: 'Montserrat', sans-serif;
            --font-brand: 'Science Gothic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-primary);
            gap: 16px;
            padding: 40px;
        }

        .ad-label {
            color: #666;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* 1080×1080 canvas */
        .ad {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #ffffff;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* Scattered product layout */
        .image-section {
            flex: 1;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }

        .panel {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 12px 32px rgba(0,0,0,0.18));
            display: block;
        }

        /* product label */
        .panel-label {
            margin-top: 8px;
            font-size: 20px;
            font-weight: 700;
            color: rgba(0,0,0,0.22);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        /* Tree - top-left, leaning left */
        .panel-tree {
            width: 340px;
            height: 400px;
            top: 190px;
            left: -20px;
            transform: rotate(-12deg);
            z-index: 1;
        }

        /* Pumpkin - center, slightly bigger, front */
        .panel-pumpkin {
            width: 400px;
            height: 460px;
            top: 160px;
            left: 50%;
            transform: translateX(-50%) rotate(5deg);
            z-index: 3;
        }

        /* Pineapple - right, leaning right, slightly behind */
        .panel-pineapple {
            width: 340px;
            height: 400px;
            top: 210px;
            right: -10px;
            transform: rotate(10deg);
            z-index: 2;
        }

        /* ── COPY BAND ── */
        .copy-band {
            position: relative;
            z-index: 3;
            background: linear-gradient(135deg, #EFCF20 0%, #f5dc40 100%);
            padding: 38px 64px 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            flex-shrink: 0;
        }

        .copy-band::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--primary);
        }

        .copy-left { flex: 1; }

        .eyebrow {
            font-size: 19px;
            font-weight: 700;
            color: rgba(0,0,0,0.42);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .headline {
            font-size: 72px;
            font-weight: 900;
            color: var(--dark);
            line-height: 0.93;
            letter-spacing: -0.025em;
            margin-bottom: 18px;
        }

        .sub {
            font-size: 21px;
            color: rgba(0,0,0,0.50);
            font-weight: 500;
            line-height: 1.5;
        }

        .copy-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 14px;
            flex-shrink: 0;
        }

        .price-badge {
            background: var(--dark);
            color: var(--light);
            font-size: 30px;
            font-weight: 800;
            padding: 12px 32px;
            border-radius: 100px;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .shipping-badge {
            background: var(--primary);
            color: var(--light);
            font-size: 16px;
            font-weight: 700;
            padding: 9px 22px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .cta-btn {
            background: var(--dark);
            color: var(--light);
            font-size: 24px;
            font-weight: 700;
            padding: 20px 44px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .url {
            font-family: var(--font-brand);
            font-size: 15px;
            color: rgba(0,0,0,0.28);
            letter-spacing: 0.06em;
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 4;
            padding: 48px 64px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo { height: 48px; width: auto; }

        .brand-name {
            font-family: var(--font-brand);
            font-size: 34px;
            font-weight: 700;
            color: var(--dark);
            letter-spacing: 0.04em;
        }

        .tag {
            background: var(--secondary);
            color: var(--dark);
            font-size: 20px;
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* ── Responsive scale-down ── */
        @media (max-width: 1180px) {
            .ad { width: min(1080px, 90vw); height: min(1080px, 90vw); }
            .top-bar { padding: min(48px, 4.4%) min(64px, 5.9%) 0; }
            .brand-logo { height: min(48px, 4.4vw); }
            .brand-name { font-size: min(34px, 3.1vw); }
            .tag { font-size: min(20px, 1.85vw); padding: min(10px, 0.9vw) min(26px, 2.4vw); }
            .copy-band { padding: min(38px, 3.5%) min(64px, 5.9%) min(44px, 4.1%); }
            .eyebrow { font-size: min(19px, 1.76vw); }
            .headline { font-size: min(72px, 6.67vw); }
            .sub { font-size: min(21px, 1.94vw); }
            .price-badge { font-size: min(30px, 2.78vw); padding: min(12px, 1.1vw) min(32px, 2.96vw); }
            .shipping-badge { font-size: min(16px, 1.48vw); padding: min(9px, 0.83vw) min(22px, 2.04vw); }
            .cta-btn { font-size: min(24px, 2.2vw); padding: min(20px, 1.85vw) min(44px, 4.07vw); }
            .url { font-size: min(15px, 1.39vw); }
            .panel-label { font-size: min(20px, 1.85vw); }
        }
    </style>
</head>
<body>
    <p class="ad-label">Instagram Ad - Articulated Legs Collection - 1080 × 1080 px</p>

    <div class="ad">

        <!-- Top bar -->
        <div class="top-bar">
            <div class="brand">
                <img class="brand-logo"
                     src="../../images/layerweaver-logo.svg"
                     alt="LayerWeaver">
                <span class="brand-name">LayerWeaver.com</span>
            </div>
            <span class="tag">3D Printed</span>
        </div>

        <!-- Products scattered playfully -->
        <div class="image-section">
            <div class="panel panel-tree">
                <img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/ChatGPT_Image_Apr_28_2026_07_22_45_PM.png?v=1777384378"
                     alt="Tree">
            </div>
            <div class="panel panel-pumpkin">
                <img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/product_Apr_28_2026_03_42_38_PM.png?v=1777371560"
                     alt="Pumpkin">
            </div>
            <div class="panel panel-pineapple">
                <img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/product_Apr_28_2026_03_44_26_PM.png?v=1777371560"
                     alt="Pineapple">
            </div>
        </div>

        <!-- Copy band -->
        <div class="copy-band">
            <div class="copy-left">
                <p class="eyebrow">Articulated Desk Buddies</p>
                <h2 class="headline">They Wiggle.<br>You'll Love It.</h2>
                
            </div>
            <div class="copy-right">
                <span class="price-badge">From ₹99</span>
                <span class="shipping-badge">Free Shipping on ₹500+</span>
                <button class="cta-btn">Shop Now →</button>
                <span class="url">LayerWeaver.com/shop</span>
            </div>
        </div>
    </div>
</body>
</html>
