<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Ad — Dino Box (Green)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Science+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A083D5;
            --secondary: #EFCF20;
            --green: #3a8c4a;
            --dark: #000000;
            --light: #FFFFFF;
            --font-primary: 'Montserrat', sans-serif;
            --font-brand: 'Science Gothic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-primary);
            gap: 16px;
            padding: 40px;
        }

        .ad-label {
            color: #666;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* 1080×1080 canvas */
        .ad {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            background: #000000;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* Image grid — fills space above copy band with all colour variants */
        .image-section {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            overflow: hidden;
        }

        .image-section .cell {
            overflow: hidden;
            position: relative;
        }

        .image-section .cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
        }

        /* ── COPY BAND ── */
        .copy-band {
            position: relative;
            z-index: 3;
            background: linear-gradient(135deg, #EFCF20 0%, #f5dc40 100%);
            padding: 40px 64px 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            flex-shrink: 0;
        }

        /* Purple accent stripe */
        .copy-band::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--primary);
        }

        .copy-left { flex: 1; }

        .eyebrow {
            font-size: 19px;
            font-weight: 700;
            color: rgba(0,0,0,0.42);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .headline {
            font-size: 76px;
            font-weight: 900;
            color: var(--dark);
            line-height: 0.93;
            letter-spacing: -0.025em;
            margin-bottom: 18px;
        }

        .sub {
            font-size: 22px;
            color: rgba(0,0,0,0.50);
            font-weight: 500;
            line-height: 1.5;
        }

        .copy-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 14px;
            flex-shrink: 0;
        }

        .price-badge {
            background: var(--dark);
            color: var(--light);
            font-size: 30px;
            font-weight: 800;
            padding: 12px 32px;
            border-radius: 100px;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        .shipping-badge {
            background: var(--primary);
            color: var(--light);
            font-size: 16px;
            font-weight: 700;
            padding: 9px 22px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .cta-btn {
            background: var(--dark);
            color: var(--light);
            font-size: 24px;
            font-weight: 700;
            padding: 20px 44px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .url {
            font-family: var(--font-brand);
            font-size: 15px;
            color: rgba(0,0,0,0.28);
            letter-spacing: 0.06em;
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 4;
            padding: 48px 64px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .brand-logo {
            height: 48px;
            width: auto;
        }

        .brand-name {
            font-family: var(--font-brand);
            font-size: 34px;
            font-weight: 700;
            color: var(--light);
            letter-spacing: 0.04em;
            text-shadow: 0 2px 12px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
        }

        .tag {
            background: var(--secondary);
            color: var(--dark);
            font-size: 20px;
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* ── Responsive scale-down ── */
        @media (max-width: 1180px) {
            .ad { width: min(1080px, 90vw); height: min(1080px, 90vw); }
            .top-bar { padding: min(48px, 4.4%) min(64px, 5.9%) 0; }
            .brand-logo { height: min(48px, 4.4vw); }
            .brand-name { font-size: min(34px, 3.1vw); }
            .tag { font-size: min(20px, 1.85vw); padding: min(10px, 0.9vw) min(26px, 2.4vw); }
            .copy-band { padding: min(40px, 3.7%) min(64px, 5.9%) min(46px, 4.3%); }
            .eyebrow { font-size: min(19px, 1.76vw); }
            .headline { font-size: min(76px, 7.03vw); }
            .sub { font-size: min(22px, 2.04vw); }
            .price-badge { font-size: min(30px, 2.78vw); padding: min(12px, 1.1vw) min(32px, 2.96vw); }
            .shipping-badge { font-size: min(16px, 1.48vw); padding: min(9px, 0.83vw) min(22px, 2.04vw); }
            .cta-btn { font-size: min(24px, 2.2vw); padding: min(20px, 1.85vw) min(44px, 4.07vw); }
            .url { font-size: min(15px, 1.39vw); }
        }
    </style>
</head>
<body>
    <p class="ad-label">Instagram Ad — Dino Box Green — 1080 × 1080 px</p>

    <div class="ad">

        <!-- Top bar -->
        <div class="top-bar">
            <div class="brand">
                <img class="brand-logo"
                     src="../../images/layerweaver-logo-white.svg"
                     alt="LayerWeaver">
                <span class="brand-name">LayerWeaver</span>
            </div>
            <span class="tag">3D Printed</span>
        </div>

        <!-- All dino colour variants as a grid -->
        <div class="image-section">
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/productApr28_2026_04_29_54PM.png?v=1777374131" alt="Green"></div>
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/product_Apr_28_2026_04_10_00_PM.png?v=1777372973" alt="Yellow"></div>
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/pink-dinosaur.png?v=1777812942" alt="Pink"></div>
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/blue-dinosaur.png?v=1777812945" alt="Blue"></div>
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/orange-dinosaur.png?v=1777812938" alt="Orange"></div>
            <div class="cell"><img src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/bright-pastel-lavender-dinosaur-pen-holder.png?v=1777817208" alt="Purple"></div>
        </div>

        <!-- Copy band -->
        <div class="copy-band">
            <div class="copy-left">
                <p class="eyebrow">Desk &amp; Bathroom Organiser</p>
                <h2 class="headline">Tidy Up<br>Dino Style.</h2>
                
            </div>
            <div class="copy-right">
                <span class="price-badge">Just ₹299</span>
                <span class="shipping-badge">Free Shipping on ₹500+</span>
                <button class="cta-btn">Shop Now →</button>
                <span class="url">layerweaver.com/shop</span>
            </div>
        </div>
    </div>
</body>
</html>
