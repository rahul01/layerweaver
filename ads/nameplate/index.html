<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Ad — Sweeping Sign Nameplate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Science+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A083D5;
            --secondary: #EFCF20;
            --dark: #000000;
            --light: #FFFFFF;
            --font-primary: 'Montserrat', sans-serif;
            --font-brand: 'Science Gothic', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: var(--font-primary);
            gap: 16px;
            padding: 40px;
        }

        .ad-label {
            color: #666;
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* 1080×1080 canvas */
        .ad {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* ── TOP: diagonal image section ── */
        .image-section {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        /* Top half — real product photo */
        .photo-panel {
            position: absolute;
            inset: 0;
            background: #1f1f1f;
            z-index: 0;
        }

        .img-photo {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            top: -20%;
            left: 50%;
            transform: translateX(-50%) rotate(-3deg);
        }

        /* Bottom half — colour render on dark background */
        .render-panel {
            position: absolute;
            inset: 0;
            background: #ffffff;
            clip-path: polygon(0 62%, 100% 50%, 100% 100%, 0 100%);
            z-index: 1;
        }

        .img-render {
            position: absolute;
            width: 150%;
            height: 150%;
            object-fit: contain;
            bottom: 2%;
            left: 50%;
            top: 5%;
            transform: translateX(-50%) rotate(-8deg);
        }

        /* Thin separator along the horizontal diagonal */
        .diagonal-sep {
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: rgba(255,255,255,0.55);
            clip-path: polygon(0 63%, 100% 50%, 100% 52%, 0 65%);
        }

        /* "Color Example" label — bottom-right corner (render panel area) */
        .render-label {
            position: absolute;
            bottom: 22px;
            right: 44px;
            font-family: var(--font-primary);
            font-size: 18px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 3;
        }

        /* ── COPY BAND ── */
        .copy-band {
            background: var(--secondary);
            padding: 44px 64px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            flex-shrink: 0;
        }

        .copy-left { flex: 1; }

        .eyebrow {
            font-family: var(--font-primary);
            font-size: 20px;
            font-weight: 700;
            color: rgba(0,0,0,0.45);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .headline {
            font-family: var(--font-primary);
            font-size: 80px;
            font-weight: 900;
            color: var(--dark);
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .sub {
            font-family: var(--font-primary);
            font-size: 23px;
            color: rgba(0,0,0,0.55);
            font-weight: 500;
            line-height: 1.5;
        }

        .copy-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 16px;
            flex-shrink: 0;
        }

        .badge {
            background: var(--dark);
            color: var(--light);
            font-family: var(--font-primary);
            font-size: 18px;
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 100px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .cta-btn {
            background: var(--dark);
            color: var(--light);
            font-family: var(--font-primary);
            font-size: 24px;
            font-weight: 700;
            padding: 22px 46px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .url {
            font-family: var(--font-brand);
            font-size: 16px;
            color: rgba(0,0,0,0.28);
            letter-spacing: 0.06em;
        }

        /* ── TOP BAR overlaid across both columns ── */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 2;
            padding: 48px 64px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.60) 0%, transparent 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .brand-logo {
            height: 48px;
            width: auto;
            flex-shrink: 0;
        }

        .brand-name {
            font-family: var(--font-brand);
            font-size: 34px;
            font-weight: 700;
            color: var(--light);
            letter-spacing: 0.04em;
            white-space: nowrap;
            text-shadow: 0 2px 12px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
        }

        .tag {
            background: var(--secondary);
            color: var(--dark);
            font-family: var(--font-primary);
            font-size: 20px;
            font-weight: 700;
            padding: 10px 26px;
            border-radius: 100px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Responsive scale-down ── */
        @media (max-width: 1180px) {
            .ad { width: min(1080px, 90vw); height: min(1080px, 90vw); }

            .top-bar { padding: min(48px, 4.4%) min(64px, 5.9%) 0; }
            .brand-logo { height: min(48px, 4.4vw); }
            .brand-name { font-size: min(34px, 3.1vw); }
            .tag { font-size: min(20px, 1.85vw); padding: min(10px, 0.9vw) min(26px, 2.4vw); }
            .copy-band { padding: min(44px, 4.1%) min(64px, 5.9%) min(50px, 4.6%); }
            .eyebrow { font-size: min(20px, 1.85vw); }
            .headline { font-size: min(80px, 7.4vw); }
            .sub { font-size: min(23px, 2.1vw); }
            .badge { font-size: min(18px, 1.67vw); padding: min(10px, 0.9vw) min(26px, 2.4vw); }
            .cta-btn { font-size: min(24px, 2.2vw); padding: min(22px, 2vw) min(46px, 4.3vw); }
            .url { font-size: min(16px, 1.5vw); }
            .render-label { font-size: min(18px, 1.67vw); }
        }
    </style>
</head>
<body>
    <p class="ad-label">Instagram Ad - Sweeping Sign Nameplate - 1080 × 1080 px</p>

    <div class="ad">
        <div class="image-section">
            <!-- Top half: real product photo -->
            <div class="photo-panel">
                <img class="img-photo"
                     src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/Jun_5_2026_05_44_32_PM.png"
                     alt="Sweeping Sign Nameplate - product photo">
            </div>

            <!-- Bottom half: dark panel with colour render -->
            <div class="render-panel">
                <img class="img-render"
                     src="https://cdn.shopify.com/s/files/1/0784/9404/0286/files/ChatGPT_Image_May_26_2026_02_05_04_PM.png?v=1779784608"
                     alt="Sweeping Sign Nameplate - colour render">
            </div>

            <!-- Thin separator along the diagonal seam -->
            <div class="diagonal-sep"></div>

            <span class="render-label">Color Example</span>
        </div>

        <!-- Top bar spans full width over both columns -->
        <div class="top-bar">
            <div class="brand">
                <img class="brand-logo"
                     src="../../images/layerweaver-logo-white.svg"
                     alt="LayerWeaver">
                <span class="brand-name">LayerWeaver</span>
            </div>
            <span class="tag">3D Printed</span>
        </div>

        <div class="copy-band">
            <div class="copy-left">
                <p class="eyebrow">Custom Nameplate</p>
                <h2 class="headline">Your Name.<br>Your Space.</h2>
                <p class="sub">Sweeping design, custom made for your<br>desk, office, or studio.</p>
            </div>
            <div class="copy-right">
                <span class="badge">Fully Customizable</span>
                <button class="cta-btn">Order Yours →</button>
                <span class="url">layerweaver.com/shop</span>
            </div>
        </div>
    </div>
</body>
</html>
